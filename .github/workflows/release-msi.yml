name: Build and Release MSI

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional installer version override (for example 1.0.1)
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build Release MSI
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}") {
            ./scripts/release.ps1 -Configuration Release -RuntimeIdentifier win-x64 -Version "${{ github.event.inputs.version }}"
          }
          elseif ("${{ github.ref_type }}" -eq "tag") {
            $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
            ./scripts/release.ps1 -Configuration Release -RuntimeIdentifier win-x64 -Version $tagVersion
          }
          else {
            ./scripts/release.ps1 -Configuration Release -RuntimeIdentifier win-x64
          }

      - name: Upload MSI Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PhotoFolderViewer-installer
          path: |
            artifacts/installer/*.msi
            artifacts/installer/*.cab
            artifacts/installer/*.wixpdb

      - name: Publish GitHub Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/installer/*.msi
            artifacts/installer/*.cab
            artifacts/installer/*.wixpdb
